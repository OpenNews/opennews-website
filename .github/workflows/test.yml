name: Test Build

on:
  push:
    branches-ignore:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  id-token: write # Required for OIDC authentication

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true

      - name: Validate YAML files
        run: bundle exec rake validate_yaml

      - name: Build Jekyll site
        run: bundle exec jekyll build --verbose

      - name: Validate HTML and check links
        run: |
          bundle exec htmlproofer ./_site \
            --disable-external \
            --no-enforce-https \
            --ignore-urls "/^http:\/\/(127\.0\.0\.1|0\.0\.0\.0|localhost|mitrakalita\.com)/" \
            --allow-hash-href

      - name: Extract deployment config from _config.yml
        if: github.event_name == 'pull_request' && env.AWS_ROLE_ARN != ''
        id: config
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          STAGING_BUCKET=$(ruby -ryaml -e "config = YAML.safe_load_file('_config.yml', permitted_classes: [], aliases: true); puts config['deployment']['staging_bucket']")
          echo "staging_bucket=$STAGING_BUCKET" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        if: github.event_name == 'pull_request' && env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: Test-${{ github.event.repository.name }}-${{ github.run_id }}

      - name: Test deployment (dry-run)
        if: github.event_name == 'pull_request' && env.AWS_ROLE_ARN != ''
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          echo "Testing S3 sync command (dry-run)..."
          set +e
          SYNC_OUTPUT=$(aws s3 sync _site/ s3://${{ steps.config.outputs.staging_bucket }} \
            --dryrun \
            --delete \
            --cache-control "public, max-age=3600" 2>&1)
          SYNC_EXIT_CODE=$?
          set -e

          echo "$SYNC_OUTPUT"

          if [ $SYNC_EXIT_CODE -eq 0 ]; then
            echo "✅ S3 sync dry-run succeeded"
            exit 0
          fi

          if echo "$SYNC_OUTPUT" | grep -q "AccessDenied" && echo "$SYNC_OUTPUT" | grep -q "s3:ListBucket"; then
            echo "⚠️  Skipping failure for limited AWS role permissions in PR dry-run context"
            echo "Role lacks s3:ListBucket on staging bucket; command syntax was still validated."
            exit 0
          fi

          echo "❌ S3 sync dry-run failed for an unexpected reason"
          exit $SYNC_EXIT_CODE

      - name: Skip deployment test (no credentials)
        if: github.event_name == 'pull_request' && env.AWS_ROLE_ARN == ''
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          echo "⏭️  Skipping S3 deployment test in this build context"
          echo "This is normal for Dependabot PRs and external contributions without AWS role access."
