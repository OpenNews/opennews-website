name: OpenNews
description: The website for OpenNews
url: https://www.opennews.org
markdown: kramdown
kramdown:
  smart_quotes: lsquo,rsquo,ldquo,rdquo
plugins:
  - jekyll-redirect-from
exclude:
  - "*.yml"
  - "Rakefile"
  - "README.md"
  - "SITE_README.md"
  - "TROUBLESHOOTING.md"
  - "LICENSE"
  - "tasks/*"
  - "Gemfile"
  - "Gemfile.lock"
  - "package.json"
  - "package-lock.json"
  - "yarn.lock"
  - "node_modules/"
  - "vendor/"
permalink: /blog/:title/
future: true

# Deployment vars - used by `rake deploy:*` tasks and GitHub Actions
deployment:
  # AWS S3 bucket for production deployments
  bucket: opennews.org
  # AWS S3 bucket for staging deployments
  staging_bucket: staging.opennews.org
  # CloudFront distribution ID for cache invalidation
  # (for production, you MUST change this to your site's ID)
  cloudfront_distribution_id: ERGOG135J2SGR

defaults:
  - scope:
      path: ""
    values:
      excerpt: ""
      # description: this value is only used for meta tags
      description: OpenNews connects a network of developers, designers, journalists, and editors to collaborate on open technologies and processes within journalism. Alongside our community, our mission includes fighting for a future where newsrooms are anti-racist, equitable, inclusive, and collaborative.
      # google_analytics_id: GA4 measurement ID for opennews.org only (srccon has its own set)
      google_analytics_id: G-RQ3XHZL1GM
